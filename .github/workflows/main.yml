name: Build ESP32-S3 OpenMV Firmware

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Install ESP-IDF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
          python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
          libusb-1.0-0

    - name: Install ESP-IDF v4.4.8
      run: |
        git clone -b release/v4.4 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
        cd $HOME/esp-idf
        ./install.sh

    - name: Build firmware
      run: |
        source $HOME/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/project/ksdiy
        
        echo "========== Starting build =========="
        
        # 清理
        rm -rf build sdkconfig
        
        # 设置目标芯片
        idf.py set-target esp32s3
        
        # 配置硬件参数
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y" >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=n" >> sdkconfig
        echo "CONFIG_SPIRAM=y" >> sdkconfig
        echo "CONFIG_SPIRAM_MODE_OCT=y" >> sdkconfig
        
        # 编译并捕获错误
        idf.py build 2>&1 | tee build.log
        BUILD_RESULT=${PIPESTATUS[0]}
        
        echo "========== Build result: $BUILD_RESULT =========="
        
        if [ $BUILD_RESULT -ne 0 ]; then
          echo ""
          echo "========== ERROR: Build failed =========="
          echo "========== Last 100 lines of build log =========="
          tail -100 build.log
          exit 1
        fi
        
        echo "========== Build successful =========="

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: openmv-firmware
        path: |
          ${{ github.workspace }}/project/ksdiy/build/bootloader.bin
          ${{ github.workspace }}/project/ksdiy/build/partition_table/partition-table.bin
          ${{ github.workspace }}/project/ksdiy/build/micropython.bin
        retention-days: 30

    - name: Upload build log on failure
      uses: actions/upload-artifact@v4
      if: failure()
      with:
        name: build-log
        path: ${{ github.workspace }}/project/ksdiy/build.log
        retention-days: 7
