name: Build ESP32-S3 OpenMV Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:    # 允许手动触发

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'    # 关键：递归下载子模块
        
    - name: Install ESP-IDF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
          python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
          libusb-1.0-0
          
    - name: Install ESP-IDF v4.4.8
      run: |
        cd ~
        git clone -b release/v4.4 --recursive https://github.com/espressif/esp-idf.git
        cd esp-idf
        ./install.sh
        echo "IDF_PATH=~/esp-idf" >> $GITHUB_ENV
        
    - name: Build firmware
      run: |
        source ~/esp-idf/export.sh
        cd project/ksdiy
        make
        
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openmv-esp32s3-firmware
        path: |
          project/ksdiy/build-GENERIC_S3/*.bin
          project/ksdiy/build-GENERIC_S3/*.elf
        retention-days: 30
