name: Build ESP32-S3 OpenMV Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - name: Install ESP-IDF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
          python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
          libusb-1.0-0
          
    - name: Install ESP-IDF v4.4.8
      run: |
        git clone -b release/v4.4 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
        cd $HOME/esp-idf
        ./install.sh
        
    - name: Build firmware
      run: |
        source $HOME/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/project/ksdiy
        
        # 清理旧配置
        rm -rf build sdkconfig
        
        # 设置目标芯片
        idf.py set-target esp32s3
        
        # 创建配置文件（使用 4MB Flash）
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y" > sdkconfig.defaults
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=n" >> sdkconfig.defaults
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=n" >> sdkconfig.defaults
        
        # 使用 VERBOSE=1 输出详细编译信息
        idf.py build VERBOSE=1
        
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openmv-esp32s3-firmware
        path: |
          ${{ github.workspace }}/project/ksdiy/build/bootloader.bin
          ${{ github.workspace }}/project/ksdiy/build/partition_table/partition-table.bin
          ${{ github.workspace }}/project/ksdiy/build/micropython.bin
        retention-days: 30
