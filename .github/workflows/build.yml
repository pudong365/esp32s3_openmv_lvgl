    - name: Configure and Build firmware
      run: |
        source $HOME/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/project/ksdiy
        
        # 删除所有可能导致冲突的组件缓存
        rm -rf managed_components
        rm -rf build
        rm -f sdkconfig
        
        # 设置目标芯片
        idf.py set-target esp32s3
        
        # 配置 Flash 大小为 16MB
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y" >> sdkconfig
        echo "CONFIG_ESPTOOLPY_FLASHSIZE_8MB=n" >> sdkconfig
        echo "CONFIG_PARTITION_TABLE_OFFSET=0x8000" >> sdkconfig
        
        # 禁用有问题的组件（通过 Kconfig 选项）
        echo "CONFIG_ESP_LCD_TOUCH_ENABLED=n" >> sdkconfig
        echo "CONFIG_ESP_DSP_ENABLED=n" >> sdkconfig
        
        # 重新生成配置
        idf.py reconfigure
        
        # 编译
        idf.py build
