- name: Build firmware
  run: |
    source $HOME/esp-idf/export.sh
    cd $GITHUB_WORKSPACE/project/ksdiy
    
    # 方法1：通过 idf.py set-property 设置（如果支持）
    # 方法2：直接修改 sdkconfig 文件中的配置（保留原有内容，只追加/修改）
    
    # 备份原配置
    cp sdkconfig sdkconfig.bak 2>/dev/null || true
    
    # 使用 sed 修改或添加配置项（安全方式）
    # 修改 Flash 大小
    sed -i 's/CONFIG_ESPTOOLPY_FLASHSIZE_8MB=y/CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y/g' sdkconfig || echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y" >> sdkconfig
    sed -i '/CONFIG_ESPTOOLPY_FLASHSIZE_8MB/d' sdkconfig
    
    # 修改 PSRAM 配置
    sed -i 's/CONFIG_SPIRAM_MODE_QUAD=y/CONFIG_SPIRAM_MODE_OCT=y/g' sdkconfig || echo "CONFIG_SPIRAM_MODE_OCT=y" >> sdkconfig
    sed -i 's/CONFIG_SPIRAM_SIZE_4MB=y/CONFIG_SPIRAM_SIZE_8MB=y/g' sdkconfig || echo "CONFIG_SPIRAM_SIZE_8MB=y" >> sdkconfig
    
    # 确保没有冲突配置
    sed -i '/CONFIG_ESPTOOLPY_FLASHSIZE_16MB=/d' sdkconfig
    echo "CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y" >> sdkconfig
    sed -i '/CONFIG_SPIRAM_MODE_OCT=/d' sdkconfig
    echo "CONFIG_SPIRAM_MODE_OCT=y" >> sdkconfig
    sed -i '/CONFIG_SPIRAM_SIZE_8MB=/d' sdkconfig
    echo "CONFIG_SPIRAM_SIZE_8MB=y" >> sdkconfig
    
    # 验证配置
    echo "=== Final Flash Configuration ==="
    grep "CONFIG_ESPTOOLPY_FLASHSIZE" sdkconfig || true
    grep "CONFIG_SPIRAM" sdkconfig | grep -E "(MODE|SIZE)" || true
    echo "================================="
    
    # 直接编译（不重新生成）
    make
