name: Build ESP32-S3 OpenMV Firmware

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
        
    - name: Install ESP-IDF dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
          python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
          libusb-1.0-0
          
    - name: Install ESP-IDF v4.4.8
      run: |
        git clone -b release/v4.4 --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
        cd $HOME/esp-idf
        ./install.sh
        
    - name: Configure for N16R8 (16MB Flash + 8MB Octal PSRAM)
      run: |
        cd $GITHUB_WORKSPACE/project/ksdiy
        # 创建配置文件，强制覆盖默认设置
        cat > sdkconfig.defaults << EOF
        CONFIG_ESPTOOLPY_FLASHSIZE_16MB=y
        CONFIG_ESPTOOLPY_FLASHSIZE_8MB=n
        CONFIG_SPIRAM_MODE_OCT=y
        CONFIG_SPIRAM_SIZE_8MB=y
        CONFIG_ESPTOOLPY_FLASHMODE_DIO=y
        CONFIG_ESPTOOLPY_FLASHFREQ_80M=y
        EOF
        
    - name: Build firmware
      run: |
        source $HOME/esp-idf/export.sh
        cd $GITHUB_WORKSPACE/project/ksdiy
        # 删除旧的配置缓存
        rm -f sdkconfig
        # 重新生成配置（会读取 sdkconfig.defaults）
        idf.py reconfigure
        # 验证配置是否生效（调试用）
        echo "=== Checking Flash configuration ==="
        grep "CONFIG_ESPTOOLPY_FLASHSIZE" sdkconfig || echo "Flash size config not found!"
        echo "====================================="
        # 编译
        make
        
    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: openmv-esp32s3-firmware
        path: |
          ${{ github.workspace }}/project/ksdiy/build-GENERIC_S3/*.bin
          ${{ github.workspace }}/project/ksdiy/build-GENERIC_S3/*.elf
        retention-days: 30
